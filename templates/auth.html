{% extends 'base.html' %}

{% block title %}
  登录与注册 - 减肥打卡系统
{% endblock %}

{% block auth_content %}
  <div class="d-flex align-items-center justify-content-center min-vh-100" style="background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
          <div class="text-center mb-4">
            <h2 class="fw-bold text-dark">🎯减肥管理系统</h2>
            <p class="text-muted">科学记录，看见你的每一次蜕变</p>
          </div>

          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-{{ message.tags }} alert-dismissible fade show shadow-sm rounded-3" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
              </div>
            {% endfor %}
          {% endif %}

          <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
            <div class="card-header bg-white pt-4 pb-0 border-0">
              <ul class="nav nav-tabs nav-justified border-bottom-0" id="authTab" role="tablist">
                <li class="nav-item" role="presentation">
                  <button class="nav-link active fw-bold fs-5 text-dark border-0 border-bottom border-3 border-primary bg-white" id="login-tab" data-bs-toggle="tab" data-bs-target="#login-pane" type="button" role="tab">登录</button>
                </li>
                <li class="nav-item" role="presentation">
                  <button class="nav-link text-muted fw-bold fs-5 border-0 bg-white" id="register-tab" data-bs-toggle="tab" data-bs-target="#register-pane" type="button" role="tab">注册</button>
                </li>
              </ul>
            </div>

            <div class="card-body p-4 p-sm-5 bg-white">
              <div class="tab-content" id="authTabContent">
                <div class="tab-pane fade show active" id="login-pane" role="tabpanel" tabindex="0">
                  <form method="POST">
                    {% csrf_token %}
                    <input type="hidden" name="action" value="login" />
                    <div class="form-floating mb-3">
                      <input type="text" class="form-control bg-light border-0" id="loginUser" name="username" placeholder="用户名" required />
                      <label for="loginUser">用户名</label>
                    </div>
                    <div class="form-floating mb-4">
                      <input type="password" class="form-control bg-light border-0" id="loginPwd" name="password" placeholder="密码" required />
                      <label for="loginPwd">密码</label>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-3 fs-5 rounded-3 shadow-sm">立即登录</button>
                  </form>
                </div>

                <div class="tab-pane fade" id="register-pane" role="tabpanel" tabindex="0">
                  <form method="POST">
                    {% csrf_token %}
                    <input type="hidden" name="action" value="register" />
                    <div class="form-floating mb-3">
                      <input type="text" class="form-control bg-light border-0" id="regUser" name="username" placeholder="用户名" required />
                      <label for="regUser">设置用户名</label>
                    </div>
                    <div class="row g-2 mb-3">
                      <div class="col-6">
                        <div class="form-floating">
                          <input type="password" class="form-control bg-light border-0" name="password" placeholder="密码" required />
                          <label>设置密码</label>
                        </div>
                      </div>
                      <div class="col-6">
                        <div class="form-floating">
                          <input type="password" class="form-control bg-light border-0" name="confirm_password" placeholder="确认密码" required />
                          <label>确认密码</label>
                        </div>
                      </div>
                    </div>
                    <hr class="text-muted my-4" />
                    <div class="form-floating mb-3">
                      <select class="form-select bg-light border-0" id="regGender" name="gender" required>
                        <option value="M" selected>男</option>
                        <option value="F">女</option>
                      </select>
                      <label for="regGender">性别</label>
                    </div>
                    <div class="row g-2 mb-4">
                      <div class="col-4">
                        <div class="form-floating">
                          <input type="number" step="0.1" class="form-control bg-light border-0" name="height" placeholder="身高" required />
                          <label>身高(cm)</label>
                        </div>
                      </div>
                      <div class="col-4">
                        <div class="form-floating">
                          <input type="number" step="0.1" class="form-control bg-light border-0" name="initial_weight" placeholder="初始" required />
                          <label>初始(kg)</label>
                        </div>
                      </div>
                      <div class="col-4">
                        <div class="form-floating">
                          <input type="number" step="0.1" class="form-control bg-light border-0" name="target_weight" placeholder="目标" required />
                          <label>目标(kg)</label>
                        </div>
                      </div>
                    </div>
                    <button type="submit" class="btn btn-success w-100 py-3 fs-5 rounded-3 shadow-sm">完成注册并登录</button>
                  </form>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}

{% block extra_js %}
  <script>
    // 简单的标签切换样式逻辑
    document.addEventListener('DOMContentLoaded', function () {
      const loginTab = document.getElementById('login-tab')
      const regTab = document.getElementById('register-tab')
    
      loginTab.addEventListener('click', function () {
        this.classList.add('active', 'border-bottom', 'border-3', 'border-primary', 'text-dark')
        this.classList.remove('text-muted')
        regTab.classList.remove('active', 'border-bottom', 'border-3', 'border-primary', 'text-dark')
        regTab.classList.add('text-muted')
      })
    
      regTab.addEventListener('click', function () {
        this.classList.add('active', 'border-bottom', 'border-3', 'border-primary', 'text-dark')
        this.classList.remove('text-muted')
        loginTab.classList.remove('active', 'border-bottom', 'border-3', 'border-primary', 'text-dark')
        loginTab.classList.add('text-muted')
      })
    })
  </script>
{% endblock %}
