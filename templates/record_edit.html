{% extends 'base.html' %}

{% block title %}修改记录 - 减肥打卡系统{% endblock %}

{% block content %}
<div class="page-header">
  <h3>修改记录</h3>
  <span style="font-size:0.82rem; color:#999;">{{ record.date|date:'Y年m月d日' }}</span>
</div>

<div class="row">
  <div class="col-lg-7">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <form method="POST">
          {% csrf_token %}

          <div style="font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#999;margin-bottom:0.75rem;">体重记录</div>
          <div class="mb-4">
            <label class="form-label">当日体重 (kg)</label>
            <input type="number" step="0.1" class="form-control" name="weight" value="{{ record.weight }}" required />
          </div>

          <div style="font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#999;margin-bottom:0.75rem;">热量记录</div>
          <div class="row g-3 mb-4">
            <div class="col-md-6">
              <label class="form-label">摄入热量 (kcal)</label>
              <input type="number" class="form-control" name="calories_in" value="{{ record.calories_in }}" required />
            </div>
            <div class="col-md-6">
              <label class="form-label">消耗热量 (kcal)</label>
              <input type="number" class="form-control" name="calories_out" value="{{ record.calories_out }}" required />
            </div>
          </div>

          <div style="font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#999;margin-bottom:0.75rem;">每日小结</div>
          <div class="mb-5">
            <label class="form-label">减肥小结</label>
            <textarea class="form-control" name="summary" rows="4">{{ record.summary }}</textarea>
          </div>

          <div style="display:flex; justify-content:flex-end; gap:0.75rem;">
            <a href="{% url 'history' %}" class="btn btn-light px-4" style="border:1px solid #dbd5cb;">取消</a>
            <button type="submit" class="btn btn-primary px-5 fw-bold">保存修改</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
